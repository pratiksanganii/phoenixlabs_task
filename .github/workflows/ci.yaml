name: CI Quality Gate

on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Verify Build & Test Suites
    runs-on: ubuntu-latest

    # 🐘 NATIVE POSTGRES SERVICE CONTAINER
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_test
        ports:
          - 5432:5432
        # Ensure the runner waits until Postgres is healthy and accepting connections
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Injection parameters for runtime validation
    env:
      PORT: "3001"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/phoenix_test?schema=public"

    steps:
      - name: 🛑 Checkout Codebase
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # ⚡ Instantly caches node_modules based on package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Get Playwright Version for Cache Key
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: 🦅 Cache Playwright Browser Binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📥 Install Playwright Browsers (Skip if Cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: 🏗️ Build Shared Packages
        run: npm run build --workspace=form-engine

      - name: 🗄️ Push Prisma Schema to Test DB
        run: npx prisma db push --schema=apps/api/prisma/schema.prisma

      - name: 🔬 Run Unit & Integration Tests (Vitest)
        run: npm run test --workspace=api

      - name: 🚀 Run End-to-End Tests (Playwright)
        run: npx playwright test